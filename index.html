<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日程看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        /* Custom scrollbar for kanban columns */
        .kanban-col::-webkit-scrollbar {
            width: 6px;
        }
        .kanban-col::-webkit-scrollbar-track {
            background: transparent;
        }
        .kanban-col::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
        .card-teaching {
            background-color: #fee2e2;
            border-left: 4px solid #ef4444;
            color: #7f1d1d;
        }
        .card-planned {
            background-color: #e0e7ff;
            border-left: 4px solid #6366f1;
            color: #312e81;
        }
        .card-free {
            background-color: #dcfce3;
            border-left: 4px solid #22c55e;
            color: #14532d;
        }
        .highlight-col {
            border: 2px solid #3b82f6 !important;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }
        .highlight-task {
            border: 2px solid #f59e0b !important;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
            transform: scale(1.02);
            position: relative;
            z-index: 10;
        }
        .highlight-task::after {
            content: '进行中';
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: #f59e0b;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }
        /* Focus Overlay Styles */
        .tree-enter {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform: scale(0);
        }
        @keyframes popIn {
            to { transform: scale(1); }
        }
    </style>
</head>
<body class="p-3 sm:p-6">

            <button onclick="checkPassword()" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition-colors font-medium">确认</button>
        </div>
    </div>

        function checkPassword() {
            const input = document.getElementById('pwd-input').value;
            if (input === '13227810437') {
                document.getElementById('auth-modal').style.display = 'none';
                document.getElementById('main-content').classList.remove('hidden');
                
                // Request Notification Permission
                if (Notification.permission !== "granted" && Notification.permission !== "denied") {
                    Notification.requestPermission();
                }

                initViewControls();
                updateHighlight();
                setInterval(updateHighlight, 60000); // 每分钟更新一次高亮
                
                updateCountdown();
                setInterval(updateCountdown, 1000); // 每秒更新倒计时
            } else {
                document.getElementById('pwd-error').classList.remove('hidden');
            }
        }

        // --- View Controls Logic ---
        function initViewControls() {
            const checkboxes = document.querySelectorAll('.day-cb');
            const btnOverview = document.getElementById('btn-overview');
            
            const now = new Date();
            const dayOfWeek = now.getDay();
            const daysMap = { 1: "周一", 2: "周二", 3: "周三", 4: "周四", 5: "周五" };
            const currentDayName = daysMap[dayOfWeek] || "周一";

            checkboxes.forEach(cb => {
                cb.checked = (cb.value === currentDayName);
                cb.addEventListener('change', updateBoardView);
            });

            btnOverview.addEventListener('click', () => {
                checkboxes.forEach(cb => cb.checked = true);
                updateBoardView();
            });

            // 类型筛选：强制确保初始勾选状态生效（防止部分浏览器在动态绑定前丢失 checked 属性）
            const typeCheckboxes = document.querySelectorAll('.type-cb');
            typeCheckboxes.forEach(cb => {
                // 根据 HTML 的 defaultChecked 属性强制同步
                cb.checked = cb.hasAttribute('checked') ? true : cb.defaultChecked;
                cb.addEventListener('change', updateTaskVisibility);
            });

            updateBoardView();
            updateTaskVisibility();
        }

        function updateTaskVisibility() {
            const checkedTypes = Array.from(document.querySelectorAll('.type-cb:checked')).map(cb => cb.value);
            document.querySelectorAll('.task-card').forEach(card => {
                const isTeaching = card.classList.contains('card-teaching');
                const isPlanned = card.classList.contains('card-planned');
                const isFree = card.classList.contains('card-free');
                
                let type = '';
                if (isTeaching) type = 'teaching';
                if (isPlanned) type = 'planned';
                if (isFree) type = 'free';

                if (checkedTypes.includes(type)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
            
            // 更新图例的划线状态
            document.querySelectorAll('.type-cb').forEach(cb => {
                const labelSpan = cb.parentElement.querySelector('span');
                if (cb.checked) {
                    labelSpan.style.textDecoration = 'none';
                    labelSpan.style.opacity = '1';
                } else {
                    labelSpan.style.textDecoration = 'line-through';
                    labelSpan.style.opacity = '0.5';
                }
            });
        }

        function updateBoardView() {
            const checkedDays = Array.from(document.querySelectorAll('.day-cb:checked')).map(cb => cb.value);
            document.querySelectorAll('.kanban-col-container').forEach(col => {
                const day = col.id.replace('col-', '');
                if (checkedDays.includes(day)) {
                    col.style.display = 'flex';
                } else {
                    col.style.display = 'none';
                }
            });
            
            const board = document.getElementById('kanban-board');
            const colsCount = checkedDays.length || 1;
            // 移动端单列展示，大屏按勾选数量分列
            const isMobile = window.innerWidth < 768;
            if (isMobile) {
                board.style.gridTemplateColumns = `repeat(1, minmax(0, 1fr))`;
            } else {
                board.style.gridTemplateColumns = `repeat(${colsCount}, minmax(0, 1fr))`;
            }
        }

        // 监听窗口尺寸变化，自适应调整布局
        window.addEventListener('resize', () => {
            if (document.getElementById('main-content') && !document.getElementById('main-content').classList.contains('hidden')) {
                updateBoardView();
            }
        });

        // --- Countdown Logic ---
        let nextTaskNotified = false;

        function getNextTeachingTask() {
            const now = new Date();
            const currentDay = now.getDay();
            const daysMap = { 1: "周一", 2: "周二", 3: "周三", 4: "周四", 5: "周五" };
            
            for (let offset = 0; offset < 7; offset++) {
                const checkDayNum = (currentDay + offset) % 7;
                // Skip weekend
                if (checkDayNum === 0 || checkDayNum === 6) continue;
                
                const dayName = daysMap[checkDayNum];
                const tasks = scheduleData[dayName];
                if (!tasks) continue;
                
                for (const task of tasks) {
                    if (task.type === 'teaching') {
                        const [startStr] = task.time.split(' - ');
                        const [hours, minutes] = startStr.split(':').map(Number);
                        
                        const taskTime = new Date(now);
                        taskTime.setDate(now.getDate() + offset);
                        taskTime.setHours(hours, minutes, 0, 0);
                        
                        if (taskTime > now) {
                            return { task, time: taskTime };
                        }
                    }
                }
            }
            return null;
        }

        function updateCountdown() {
            const nextTaskInfo = getNextTeachingTask();
            const countdownEl = document.getElementById('next-task-countdown');
            
            if (!nextTaskInfo) {
                countdownEl.classList.add('hidden');
                return;
            }
            
            countdownEl.classList.remove('hidden');
            const now = new Date();
            const diffSeconds = Math.floor((nextTaskInfo.time - now) / 1000);
            
            if (diffSeconds <= 0) {
                nextTaskNotified = false;
                return;
            }
            
            const h = Math.floor(diffSeconds / 3600);
            const m = Math.floor((diffSeconds % 3600) / 60);
            const s = diffSeconds % 60;
            
            document.getElementById('next-task-name').textContent = nextTaskInfo.task.title;
            document.getElementById('countdown-timer').textContent = 
                `${h > 0 ? h.toString().padStart(2, '0') + ':' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                
            if (diffSeconds === 300 && !nextTaskNotified) {
                showNotification(`提醒：距离教学任务 [${nextTaskInfo.task.title}] 还有5分钟！`);
                nextTaskNotified = true;
            }
        }

        function showNotification(msg) {
            if (Notification.permission === "granted") {
                new Notification("日程看板提醒", { body: msg });
            } else {
                alert(msg);
            }
        }

        // --- Sidebar Toggle ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const icon = document.getElementById('sidebar-icon');
            if (sidebar.classList.contains('translate-x-full')) {
                sidebar.classList.remove('translate-x-full');
                sidebar.classList.add('translate-x-0');
                icon.textContent = '▶';
            } else {
                sidebar.classList.remove('translate-x-0');
                sidebar.classList.add('translate-x-full');
                icon.textContent = '◀';
            }
        }

        // --- Pomodoro Logic ---
        let focusInterval;
        let focusTimeElapsed = 0;
        let focusTotalTime = 0;
        let isFocusStopwatch = false;

        function startFocus(stopwatch) {
            isFocusStopwatch = stopwatch;
            focusTimeElapsed = 0;
            
            if (!stopwatch) {
                const mins = parseInt(document.getElementById('focus-duration').value) || 25;
                focusTotalTime = mins * 60;
            }
            
            document.getElementById('focus-overlay').classList.remove('hidden');
            document.getElementById('focus-overlay').classList.add('flex');
            document.getElementById('trees-container').innerHTML = '';
            
            updateFocusDisplay();
            
            focusInterval = setInterval(() => {
                focusTimeElapsed++;
                updateFocusDisplay();
                
                // Plant a tree every 5 minutes (300 seconds)
                if (focusTimeElapsed > 0 && focusTimeElapsed % 300 === 0) {
                    plantTree();
                }
                
                if (!isFocusStopwatch && focusTimeElapsed >= focusTotalTime) {
                    endFocus(true);
                }
            }, 1000);
        }

        function updateFocusDisplay() {
            let displaySeconds = 0;
            if (isFocusStopwatch) {
                displaySeconds = focusTimeElapsed;
            } else {
                displaySeconds = focusTotalTime - focusTimeElapsed;
            }
            
            const m = Math.floor(displaySeconds / 60);
            const s = displaySeconds % 60;
            document.getElementById('focus-timer-display').textContent = 
                `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function plantTree() {
            const tree = document.createElement('div');
            tree.textContent = '🌲';
            tree.className = 'text-4xl tree-enter';
            document.getElementById('trees-container').appendChild(tree);
        }

        function endFocus(completed = false) {
            clearInterval(focusInterval);
            document.getElementById('focus-overlay').classList.add('hidden');
            document.getElementById('focus-overlay').classList.remove('flex');
            
            if (completed) {
                showNotification("专注时间到！请确认结束。");
                alert("专注时间到！");
            }
        }

        function updateHighlight() {
            const now = new Date();
            const dayOfWeek = now.getDay(); // 0 (Sun) to 6 (Sat)
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();
            const currentTimeStr = `${currentHour.toString().padStart(2, '0')}:${currentMinute.toString().padStart(2, '0')}`;

            const daysMap = { 1: "周一", 2: "周二", 3: "周三", 4: "周四", 5: "周五" };
            const currentDayName = daysMap[dayOfWeek];

            // 清除所有高亮
            document.querySelectorAll('.kanban-col-container').forEach(col => col.classList.remove('highlight-col'));
            document.querySelectorAll('.task-card').forEach(card => card.classList.remove('highlight-task'));

            if (currentDayName) {
                // 高亮当前列
                const colElement = document.getElementById(`col-${currentDayName}`);
                if (colElement) {
                    colElement.classList.add('highlight-col');
                }

                // 高亮当前任务
                const tasks = scheduleData[currentDayName];
                if (tasks) {
                    tasks.forEach((task, index) => {
                        const [start, end] = task.time.split(' - ');
                        if (currentTimeStr >= start && currentTimeStr < end) {
                            const cardElement = document.getElementById(`task-${currentDayName}-${index}`);
                            if (cardElement) {
                                cardElement.classList.add('highlight-task');
                                // 平滑滚动到当前任务
                                cardElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            }
                        }
                    });
                }
            }
        }

        const board = document.getElementById('kanban-board');

        Object.entries(scheduleData).forEach(([day, tasks]) => {
            // Create column
            const col = document.createElement('div');
            col.id = `col-${day}`;
            col.className = 'kanban-col-container bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col h-[70vh] sm:h-[80vh] transition-all duration-300';
            
            // Column Header
            const header = document.createElement('div');
            header.className = 'p-4 border-b border-gray-100 bg-gray-50 rounded-t-xl';
            header.innerHTML = `<h2 class="text-lg font-bold text-gray-800 text-center">${day}</h2>`;
            col.appendChild(header);

            // Column Body (Scrollable)
            const body = document.createElement('div');
            body.className = 'p-3 flex-1 overflow-y-auto kanban-col space-y-3';

            tasks.forEach((task, index) => {
                const card = document.createElement('div');
                card.id = `task-${day}-${index}`;
                card.className = `task-card p-3 rounded-lg shadow-sm text-sm transition-all duration-300 hover:scale-[1.02] cursor-default card-${task.type}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="font-semibold text-xs opacity-80">${task.time}</span>
                        <span class="text-xs font-bold bg-white/50 px-1.5 py-0.5 rounded">${task.duration}</span>
                    </div>
                    <div class="font-bold text-base mt-1 task-title">${task.title}</div>
                `;
                body.appendChild(card);
            });

            col.appendChild(body);
            board.appendChild(col);
        });
    </script>
</body>
</html>
