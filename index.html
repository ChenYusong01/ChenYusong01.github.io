<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日程看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 看板数据配置文件（与本页面解耦，便于独立维护） -->
    <script src="./schedule-data.js"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        /* Custom scrollbar for kanban columns */
        .kanban-col::-webkit-scrollbar {
            width: 6px;
        }
        .kanban-col::-webkit-scrollbar-track {
            background: transparent;
        }
        .kanban-col::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
        .card-teaching {
            background-color: #fee2e2;
            border-left: 4px solid #ef4444;
            color: #7f1d1d;
        }
        .card-planned {
            background-color: #e0e7ff;
            border-left: 4px solid #6366f1;
            color: #312e81;
        }
        .card-free {
            background-color: #dcfce3;
            border-left: 4px solid #22c55e;
            color: #14532d;
        }
        .highlight-col {
            border: 2px solid #3b82f6 !important;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }
        .highlight-task {
            border: 2px solid #f59e0b !important;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
            transform: scale(1.02);
            position: relative;
            z-index: 10;
        }
        .highlight-task::after {
            content: '进行中';
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: #f59e0b;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }
        /* Focus Overlay Styles */
        .tree-enter {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform: scale(0);
        }
        @keyframes popIn {
            to { transform: scale(1); }
        }
        /* 移动端：筛选项横向滚动条隐藏，保证一行内整齐排列 */
        .filter-scroll::-webkit-scrollbar {
            display: none;
        }
        .filter-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 子日程项缩进展示 */
        .sub-task-item {
            margin-left: 12px;
            border-left: 2px dashed currentColor;
            padding-left: 8px;
            opacity: 0.85;
            font-size: 0.85em;
        }
        /* 编辑模式下日程卡片悬浮工具按钮 */
        .task-card .edit-actions {
            display: none;
        }
        body.edit-mode .task-card .edit-actions {
            display: flex;
        }
        body.edit-mode .task-card {
            cursor: pointer;
        }
        body.edit-mode .task-card:hover {
            outline: 2px dashed #6366f1;
        }
    </style>
</head>
<body class="p-3 sm:p-6">
<!-- Auth Modal -->
<div id="auth-modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50 backdrop-blur-sm">
    <div class="bg-white p-8 rounded-xl shadow-2xl w-96 text-center">
        <h2 class="text-2xl font-bold mb-4 text-gray-800">访问受限</h2>
        <p class="text-gray-600 mb-6">请输入查看密码以访问日程规划表</p>
        <input type="password" id="pwd-input" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="请输入密码" onkeypress="if(event.key === 'Enter') checkPassword()">
        <p id="pwd-error" class="text-red-500 text-sm mb-4 hidden">密码错误，请重试</p>
        <button onclick="checkPassword()" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition-colors font-medium">确认</button>
    </div>
</div>

<div id="main-content" class="max-w-7xl mx-auto hidden">
    <!-- Header -->
    <div class="mb-6 sm:mb-8 text-center">
        <h1 class="text-xl sm:text-3xl font-bold text-gray-800 mb-3 sm:mb-4">王老师日常教学安排 & 任务规划看板</h1>

        <!-- Countdown -->
        <div id="next-task-countdown" class="mb-4 text-sm sm:text-lg font-bold text-red-600 hidden bg-red-50 inline-block px-3 sm:px-6 py-2 rounded-full border border-red-200 shadow-sm max-w-full break-words">
            ⏱️ 距离下一教学任务 (<span id="next-task-name"></span>) 还有: <span id="countdown-timer"></span>
        </div>

        <!-- 编辑工具栏 -->
        <div class="flex flex-wrap justify-center gap-2 mb-3">
            <button id="btn-toggle-edit" onclick="toggleEditMode()" class="px-3 sm:px-4 py-1.5 bg-amber-500 text-white rounded hover:bg-amber-600 active:bg-amber-700 font-medium transition-colors text-sm shadow-sm">✏️ 进入编辑模式</button>
            <button id="btn-reset-data" onclick="resetScheduleData()" class="px-3 sm:px-4 py-1.5 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 active:bg-gray-400 font-medium transition-colors text-sm shadow-sm">🔄 恢复默认</button>
        </div>

        <!-- View Controls: 日期筛选行 -->
        <div class="flex sm:flex-wrap sm:justify-center gap-2 sm:gap-4 mb-3 sm:mb-6 items-center bg-white p-2 sm:p-3 rounded-lg shadow-sm overflow-x-auto filter-scroll">
            <button id="btn-overview" class="flex-shrink-0 px-3 sm:px-4 py-1.5 bg-indigo-100 text-indigo-700 rounded hover:bg-indigo-200 active:bg-indigo-300 font-medium transition-colors text-sm sm:text-base">全览</button>
            <div class="flex flex-nowrap sm:flex-wrap gap-1 sm:gap-4 sm:border-l sm:pl-4 sm:justify-center flex-shrink-0" id="day-filters">
                <label class="day-label flex items-center gap-1 cursor-pointer px-2 sm:px-3 py-1.5 rounded hover:bg-gray-100 active:bg-gray-200 select-none text-sm sm:text-base touch-manipulation flex-shrink-0"><input type="checkbox" value="周一" class="day-cb w-4 h-4 text-indigo-600 pointer-events-none"> 周一</label>
                <label class="day-label flex items-center gap-1 cursor-pointer px-2 sm:px-3 py-1.5 rounded hover:bg-gray-100 active:bg-gray-200 select-none text-sm sm:text-base touch-manipulation flex-shrink-0"><input type="checkbox" value="周二" class="day-cb w-4 h-4 text-indigo-600 pointer-events-none"> 周二</label>
                <label class="day-label flex items-center gap-1 cursor-pointer px-2 sm:px-3 py-1.5 rounded hover:bg-gray-100 active:bg-gray-200 select-none text-sm sm:text-base touch-manipulation flex-shrink-0"><input type="checkbox" value="周三" class="day-cb w-4 h-4 text-indigo-600 pointer-events-none"> 周三</label>
                <label class="day-label flex items-center gap-1 cursor-pointer px-2 sm:px-3 py-1.5 rounded hover:bg-gray-100 active:bg-gray-200 select-none text-sm sm:text-base touch-manipulation flex-shrink-0"><input type="checkbox" value="周四" class="day-cb w-4 h-4 text-indigo-600 pointer-events-none"> 周四</label>
                <label class="day-label flex items-center gap-1 cursor-pointer px-2 sm:px-3 py-1.5 rounded hover:bg-gray-100 active:bg-gray-200 select-none text-sm sm:text-base touch-manipulation flex-shrink-0"><input type="checkbox" value="周五" class="day-cb w-4 h-4 text-indigo-600 pointer-events-none"> 周五</label>
            </div>
        </div>

        <!-- View Controls: 类型筛选行 -->
        <div class="flex sm:flex-wrap flex-nowrap sm:justify-center justify-start gap-1 sm:gap-6 text-xs sm:text-sm bg-white sm:bg-transparent p-2 sm:p-0 rounded-lg shadow-sm sm:shadow-none overflow-x-auto filter-scroll" id="type-filters">
            <label class="type-label flex items-center gap-1.5 sm:gap-2 cursor-pointer opacity-100 transition-opacity hover:opacity-80 active:bg-gray-100 px-2 sm:px-3 py-1.5 rounded select-none touch-manipulation flex-shrink-0">
                <input type="checkbox" value="teaching" class="type-cb w-4 h-4 text-red-600 rounded focus:ring-red-500 pointer-events-none" checked>
                <div class="w-3.5 h-3.5 sm:w-4 sm:h-4 rounded bg-red-100 border-l-4 border-red-500 flex-shrink-0"></div>
                <span class="text-gray-700 font-medium transition-all duration-300 whitespace-nowrap">教学占用 <span class="hidden sm:inline">(不可排期)</span></span>
            </label>
            <label class="type-label flex items-center gap-1.5 sm:gap-2 cursor-pointer opacity-100 transition-opacity hover:opacity-80 active:bg-gray-100 px-2 sm:px-3 py-1.5 rounded select-none touch-manipulation flex-shrink-0">
                <input type="checkbox" value="planned" class="type-cb w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500 pointer-events-none" checked>
                <div class="w-3.5 h-3.5 sm:w-4 sm:h-4 rounded bg-indigo-100 border-l-4 border-indigo-500 flex-shrink-0"></div>
                <span class="text-gray-700 font-medium transition-all duration-300 whitespace-nowrap">规划任务 <span class="hidden sm:inline">(教案/批改)</span></span>
            </label>
            <label class="type-label flex items-center gap-1.5 sm:gap-2 cursor-pointer opacity-100 transition-opacity hover:opacity-80 active:bg-gray-100 px-2 sm:px-3 py-1.5 rounded select-none touch-manipulation flex-shrink-0">
                <input type="checkbox" value="free" class="type-cb w-4 h-4 text-green-600 rounded focus:ring-green-500 pointer-events-none" checked>
                <div class="w-3.5 h-3.5 sm:w-4 sm:h-4 rounded bg-green-100 border-l-4 border-green-500 flex-shrink-0"></div>
                <span class="text-gray-700 font-medium transition-all duration-300 whitespace-nowrap">空闲/机动 <span class="hidden sm:inline">(可休息)</span></span>
            </label>
        </div>
    </div>

    <!-- Kanban Board -->
    <div class="grid gap-3 sm:gap-4 transition-all duration-500" id="kanban-board">
        <!-- Columns will be injected by JS -->
    </div>
</div>

<!-- 日程编辑模态框 -->
<div id="edit-modal" class="fixed inset-0 bg-gray-900 bg-opacity-60 hidden items-center justify-center z-50 backdrop-blur-sm p-4 overflow-y-auto">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg my-auto">
        <div class="flex items-center justify-between border-b border-gray-200 p-4">
            <h3 class="text-lg font-bold text-gray-800" id="edit-modal-title">新建日程</h3>
            <button onclick="closeEditModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
        </div>
        <div class="p-4 space-y-3 max-h-[70vh] overflow-y-auto">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">所属日期 <span class="text-red-500">*</span></label>
                <select id="edit-day" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="周一">周一</option>
                    <option value="周二">周二</option>
                    <option value="周三">周三</option>
                    <option value="周四">周四</option>
                    <option value="周五">周五</option>
                </select>
            </div>
            <div class="flex gap-2">
                <div class="flex-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">开始时间 <span class="text-red-500">*</span></label>
                    <input type="time" id="edit-start" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="flex-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">结束时间 <span class="text-red-500">*</span></label>
                    <input type="time" id="edit-end" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">日程标题 <span class="text-red-500">*</span></label>
                <input type="text" id="edit-title" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="如：📝 作业批改">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">类型 <span class="text-red-500">*</span></label>
                <select id="edit-type" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="teaching">教学占用 (不可排期)</option>
                    <option value="planned">规划任务 (教案/批改)</option>
                    <option value="free">空闲/机动 (可休息)</option>
                </select>
            </div>

            <!-- 子日程编辑（仅父日程展示） -->
            <div id="sub-tasks-section">
                <div class="flex items-center justify-between mb-2">
                    <label class="text-sm font-medium text-gray-700">子日程项目</label>
                    <button type="button" onclick="addSubTaskInput()" class="text-xs px-2 py-1 bg-indigo-100 text-indigo-700 rounded hover:bg-indigo-200">+ 添加子日程</button>
                </div>
                <div id="sub-tasks-list" class="space-y-2"></div>
            </div>

            <p id="edit-error" class="text-red-500 text-sm hidden"></p>
        </div>
        <div class="flex justify-between items-center border-t border-gray-200 p-4 gap-2">
            <button id="edit-delete-btn" onclick="deleteCurrentTask()" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors hidden">删除</button>
            <div class="flex gap-2 ml-auto">
                <button onclick="closeEditModal()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-colors">取消</button>
                <button onclick="saveTaskEdit()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- Sidebar (Pomodoro) -->
<div id="sidebar" class="fixed right-0 top-1/4 w-60 sm:w-64 max-w-[80vw] bg-white shadow-2xl rounded-l-2xl p-4 sm:p-5 border border-gray-200 z-40 transform transition-transform duration-300 translate-x-full">
    <button id="sidebar-toggle" onclick="toggleSidebar()" class="absolute -left-10 top-1/2 transform -translate-y-1/2 bg-white w-10 h-12 flex items-center justify-center rounded-l-lg shadow-[0_4px_6px_-1px_rgba(0,0,0,0.1),-4px_0_6px_-1px_rgba(0,0,0,0.1)] border border-r-0 border-gray-200 text-gray-600 hover:text-indigo-600 focus:outline-none touch-manipulation">
        <span id="sidebar-icon" class="text-lg">◀</span>
    </button>
    <h3 class="text-xl font-bold mb-4 text-gray-800 flex items-center gap-2">🍅 番茄时钟</h3>
    <div class="mb-4">
        <label class="block text-sm mb-1 text-gray-600">专注时长 (分钟):</label>
        <input type="number" id="focus-duration" value="25" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
    </div>
    <button onclick="startFocus(false)" class="w-full bg-indigo-600 text-white py-2.5 rounded-lg mb-3 hover:bg-indigo-700 transition-colors font-medium shadow-sm">开始倒计时专注</button>
    <button onclick="startFocus(true)" class="w-full bg-emerald-500 text-white py-2.5 rounded-lg hover:bg-emerald-600 transition-colors font-medium shadow-sm">开始正向计时专注</button>
</div>

<!-- Focus Overlay -->
<div id="focus-overlay" class="fixed inset-0 bg-gray-900/60 backdrop-blur-md z-50 hidden flex-col items-center justify-center">
    <div class="text-white text-6xl font-bold mb-12 tracking-wider drop-shadow-lg" id="focus-timer-display">25:00</div>

    <!-- Floating Island -->
    <div id="floating-island" class="relative w-80 h-80 bg-emerald-100 rounded-full shadow-[0_20px_50px_rgba(0,0,0,0.3)] border-8 border-emerald-300 flex items-end justify-center overflow-hidden mb-12">
        <div class="absolute bottom-0 w-full h-2/5 bg-emerald-500"></div>
        <div class="absolute bottom-2/5 w-full h-4 bg-emerald-400"></div>
        <div id="trees-container" class="absolute bottom-[35%] w-full flex justify-center items-end gap-3 px-6 flex-wrap z-10">
            <!-- Trees will be appended here -->
        </div>
    </div>

    <button onclick="endFocus()" class="px-8 py-3 bg-red-500 text-white rounded-full hover:bg-red-600 shadow-lg font-bold text-lg transition-transform hover:scale-105">结束专注</button>
</div>

<script>
    // 看板数据来源：优先从 localStorage 读取用户编辑后的版本，否则使用外部 schedule-data.js 提供的默认数据

    // ===== 数据存储与加载 =====
    const STORAGE_KEY = 'schedule_kanban_data_v2';
    // 当前生效的看板数据
    let scheduleData = loadScheduleData();

    function loadScheduleData() {
        try {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                return JSON.parse(saved);
            }
        } catch (e) { console.warn('读取本地日程数据失败，使用默认数据', e); }
        return JSON.parse(JSON.stringify(window.DEFAULT_SCHEDULE_DATA || {}));
    }

    function saveScheduleData() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(scheduleData));
        } catch (e) { console.warn('保存日程数据失败', e); }
    }

    function resetScheduleData() {
        if (!confirm('确定要恢复默认日程数据吗？所有自定义修改将丢失！')) return;
        localStorage.removeItem(STORAGE_KEY);
        scheduleData = JSON.parse(JSON.stringify(window.DEFAULT_SCHEDULE_DATA || {}));
        rerenderBoard();
    }

    // ===== 工具函数 =====
    function timeToMinutes(t) {
        if (!t) return 0;
        const [h, m] = t.split(':').map(Number);
        return h * 60 + (m || 0);
    }
    function calcDuration(start, end) {
        const diff = timeToMinutes(end) - timeToMinutes(start);
        return diff > 0 ? `${diff}'` : '';
    }
    function generateId() {
        return 'task-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
    }

    /**
     * 校验时间段冲突：检查 [start,end) 是否与 day 下其他日程时间段重叠
     * @param {string} day 周几
     * @param {string} start "HH:MM"
     * @param {string} end   "HH:MM"
     * @param {string|null} excludeId 编辑时排除自身id
     * @returns {string|null} 冲突时返回错误消息，无冲突返回 null
     */
    function validateTimeConflict(day, start, end, excludeId) {
        const sMin = timeToMinutes(start);
        const eMin = timeToMinutes(end);
        if (eMin <= sMin) return '结束时间必须晚于开始时间';
        const tasks = scheduleData[day] || [];
        for (const t of tasks) {
            if (excludeId && t.id === excludeId) continue;
            const [ts, te] = t.time.split(' - ');
            const tsMin = timeToMinutes(ts);
            const teMin = timeToMinutes(te);
            // 区间重叠判断：sMin < teMin && eMin > tsMin
            if (sMin < teMin && eMin > tsMin) {
                return `时间冲突：与已有日程「${t.title}」(${t.time}) 时间段重叠`;
            }
        }
        return null;
    }

    function checkPassword() {
        const input = document.getElementById('pwd-input').value;
        if (input === '13227810437') {
            document.getElementById('auth-modal').style.display = 'none';
            document.getElementById('main-content').classList.remove('hidden');

            // Request Notification Permission
            if (Notification.permission !== "granted" && Notification.permission !== "denied") {
                Notification.requestPermission();
            }

            initViewControls();
            updateHighlight();
            setInterval(updateHighlight, 60000); // 每分钟更新一次高亮

            updateCountdown();
            setInterval(updateCountdown, 1000); // 每秒更新倒计时
        } else {
            document.getElementById('pwd-error').classList.remove('hidden');
        }
    }

    // --- View Controls Logic ---
    function initViewControls() {
        const checkboxes = document.querySelectorAll('.day-cb');
        const btnOverview = document.getElementById('btn-overview');

        const now = new Date();
        const dayOfWeek = now.getDay();
        const daysMap = { 1: "周一", 2: "周二", 3: "周三", 4: "周四", 5: "周五" };
        const currentDayName = daysMap[dayOfWeek] || "周一";

        checkboxes.forEach(cb => {
            cb.checked = (cb.value === currentDayName);
            cb.addEventListener('change', updateBoardView);
        });

        btnOverview.addEventListener('click', () => {
            checkboxes.forEach(cb => cb.checked = true);
            updateBoardView();
        });

        // 类型筛选：强制确保初始勾选状态生效（防止部分浏览器在动态绑定前丢失 checked 属性）
        const typeCheckboxes = document.querySelectorAll('.type-cb');
        typeCheckboxes.forEach(cb => {
            // 根据 HTML 的 defaultChecked 属性强制同步
            cb.checked = cb.hasAttribute('checked') ? true : cb.defaultChecked;
            cb.addEventListener('change', updateTaskVisibility);
        });

        updateBoardView();
        updateTaskVisibility();
    }

    function updateTaskVisibility() {
        const checkedTypes = Array.from(document.querySelectorAll('.type-cb:checked')).map(cb => cb.value);
        document.querySelectorAll('.task-card').forEach(card => {
            const isTeaching = card.classList.contains('card-teaching');
            const isPlanned = card.classList.contains('card-planned');
            const isFree = card.classList.contains('card-free');

            let type = '';
            if (isTeaching) type = 'teaching';
            if (isPlanned) type = 'planned';
            if (isFree) type = 'free';

            if (checkedTypes.includes(type)) {
                card.style.display = 'block';
            } else {
                card.style.display = 'none';
            }
        });

        // 更新图例的划线状态
        document.querySelectorAll('.type-cb').forEach(cb => {
            const labelSpan = cb.parentElement.querySelector('span');
            if (cb.checked) {
                labelSpan.style.textDecoration = 'none';
                labelSpan.style.opacity = '1';
            } else {
                labelSpan.style.textDecoration = 'line-through';
                labelSpan.style.opacity = '0.5';
            }
        });
    }

    function updateBoardView() {
        const checkedDays = Array.from(document.querySelectorAll('.day-cb:checked')).map(cb => cb.value);
        document.querySelectorAll('.kanban-col-container').forEach(col => {
            const day = col.id.replace('col-', '');
            if (checkedDays.includes(day)) {
                col.style.display = 'flex';
            } else {
                col.style.display = 'none';
            }
        });

        const board = document.getElementById('kanban-board');
        const colsCount = checkedDays.length || 1;
        // 移动端单列展示，大屏按勾选数量分列
        const isMobile = window.innerWidth < 768;
        if (isMobile) {
            board.style.gridTemplateColumns = `repeat(1, minmax(0, 1fr))`;
        } else {
            board.style.gridTemplateColumns = `repeat(${colsCount}, minmax(0, 1fr))`;
        }
    }

    // 监听窗口尺寸变化，自适应调整布局
    window.addEventListener('resize', () => {
        if (document.getElementById('main-content') && !document.getElementById('main-content').classList.contains('hidden')) {
            updateBoardView();
        }
    });

    // --- Countdown Logic ---
    let nextTaskNotified = false;

    function getNextTeachingTask() {
        const now = new Date();
        const currentDay = now.getDay();
        const daysMap = { 1: "周一", 2: "周二", 3: "周三", 4: "周四", 5: "周五" };

        for (let offset = 0; offset < 7; offset++) {
            const checkDayNum = (currentDay + offset) % 7;
            // Skip weekend
            if (checkDayNum === 0 || checkDayNum === 6) continue;

            const dayName = daysMap[checkDayNum];
            const tasks = scheduleData[dayName];
            if (!tasks) continue;

            for (const task of tasks) {
                if (task.type === 'teaching') {
                    const [startStr] = task.time.split(' - ');
                    const [hours, minutes] = startStr.split(':').map(Number);

                    const taskTime = new Date(now);
                    taskTime.setDate(now.getDate() + offset);
                    taskTime.setHours(hours, minutes, 0, 0);

                    if (taskTime > now) {
                        return { task, time: taskTime };
                    }
                }
            }
        }
        return null;
    }

    function updateCountdown() {
        const nextTaskInfo = getNextTeachingTask();
        const countdownEl = document.getElementById('next-task-countdown');

        if (!nextTaskInfo) {
            countdownEl.classList.add('hidden');
            return;
        }

        countdownEl.classList.remove('hidden');
        const now = new Date();
        const diffSeconds = Math.floor((nextTaskInfo.time - now) / 1000);

        if (diffSeconds <= 0) {
            nextTaskNotified = false;
            return;
        }

        const h = Math.floor(diffSeconds / 3600);
        const m = Math.floor((diffSeconds % 3600) / 60);
        const s = diffSeconds % 60;

        document.getElementById('next-task-name').textContent = nextTaskInfo.task.title;
        document.getElementById('countdown-timer').textContent =
            `${h > 0 ? h.toString().padStart(2, '0') + ':' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

        if (diffSeconds === 300 && !nextTaskNotified) {
            showNotification(`提醒：距离教学任务 [${nextTaskInfo.task.title}] 还有5分钟！`);
            nextTaskNotified = true;
        }
    }

    function showNotification(msg) {
        if (Notification.permission === "granted") {
            new Notification("日程看板提醒", { body: msg });
        } else {
            alert(msg);
        }
    }

    // --- Sidebar Toggle ---
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const icon = document.getElementById('sidebar-icon');
        if (sidebar.classList.contains('translate-x-full')) {
            sidebar.classList.remove('translate-x-full');
            sidebar.classList.add('translate-x-0');
            icon.textContent = '▶';
        } else {
            sidebar.classList.remove('translate-x-0');
            sidebar.classList.add('translate-x-full');
            icon.textContent = '◀';
        }
    }

    // --- Pomodoro Logic ---
    let focusInterval;
    let focusTimeElapsed = 0;
    let focusTotalTime = 0;
    let isFocusStopwatch = false;

    function startFocus(stopwatch) {
        isFocusStopwatch = stopwatch;
        focusTimeElapsed = 0;

        if (!stopwatch) {
            const mins = parseInt(document.getElementById('focus-duration').value) || 25;
            focusTotalTime = mins * 60;
        }

        document.getElementById('focus-overlay').classList.remove('hidden');
        document.getElementById('focus-overlay').classList.add('flex');
        document.getElementById('trees-container').innerHTML = '';

        updateFocusDisplay();

        focusInterval = setInterval(() => {
            focusTimeElapsed++;
            updateFocusDisplay();

            // Plant a tree every 5 minutes (300 seconds)
            if (focusTimeElapsed > 0 && focusTimeElapsed % 300 === 0) {
                plantTree();
            }

            if (!isFocusStopwatch && focusTimeElapsed >= focusTotalTime) {
                endFocus(true);
            }
        }, 1000);
    }

    function updateFocusDisplay() {
        let displaySeconds = 0;
        if (isFocusStopwatch) {
            displaySeconds = focusTimeElapsed;
        } else {
            displaySeconds = focusTotalTime - focusTimeElapsed;
        }

        const m = Math.floor(displaySeconds / 60);
        const s = displaySeconds % 60;
        document.getElementById('focus-timer-display').textContent =
            `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function plantTree() {
        const tree = document.createElement('div');
        tree.textContent = '🌲';
        tree.className = 'text-4xl tree-enter';
        document.getElementById('trees-container').appendChild(tree);
    }

    function endFocus(completed = false) {
        clearInterval(focusInterval);
        document.getElementById('focus-overlay').classList.add('hidden');
        document.getElementById('focus-overlay').classList.remove('flex');

        if (completed) {
            showNotification("专注时间到！请确认结束。");
            alert("专注时间到！");
        }
    }

    function updateHighlight() {
        const now = new Date();
        const dayOfWeek = now.getDay(); // 0 (Sun) to 6 (Sat)
        const currentHour = now.getHours();
        const currentMinute = now.getMinutes();
        const currentTimeStr = `${currentHour.toString().padStart(2, '0')}:${currentMinute.toString().padStart(2, '0')}`;

        const daysMap = { 1: "周一", 2: "周二", 3: "周三", 4: "周四", 5: "周五" };
        const currentDayName = daysMap[dayOfWeek];

        // 清除所有高亮
        document.querySelectorAll('.kanban-col-container').forEach(col => col.classList.remove('highlight-col'));
        document.querySelectorAll('.task-card').forEach(card => card.classList.remove('highlight-task'));

        if (currentDayName) {
            // 高亮当前列
            const colElement = document.getElementById(`col-${currentDayName}`);
            if (colElement) {
                colElement.classList.add('highlight-col');
            }

            // 高亮当前任务
            const tasks = scheduleData[currentDayName];
            if (tasks) {
                tasks.forEach((task, index) => {
                    const [start, end] = task.time.split(' - ');
                    if (currentTimeStr >= start && currentTimeStr < end) {
                        const cardElement = document.getElementById(`task-${currentDayName}-${index}`);
                        if (cardElement) {
                            cardElement.classList.add('highlight-task');
                            // 平滑滚动到当前任务
                            cardElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    }
                });
            }
        }
    }

    // ===== 看板渲染 =====
    function escapeHtml(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function renderBoard() {
        const board = document.getElementById('kanban-board');
        if (!board) return;
        board.innerHTML = '';

        // 按时间排序，保证编辑后顺序正确
        Object.entries(scheduleData).forEach(([day, tasks]) => {
            tasks.sort((a, b) => timeToMinutes(a.time.split(' - ')[0]) - timeToMinutes(b.time.split(' - ')[0]));
        });

        Object.entries(scheduleData).forEach(([day, tasks]) => {
            const col = document.createElement('div');
            col.id = `col-${day}`;
            col.className = 'kanban-col-container bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col h-[70vh] sm:h-[80vh] transition-all duration-300';

            const header = document.createElement('div');
            header.className = 'p-4 border-b border-gray-100 bg-gray-50 rounded-t-xl flex items-center justify-between';
            header.innerHTML = `
                <h2 class="text-lg font-bold text-gray-800">${day}</h2>
                <button class="add-task-btn hidden text-xs px-2 py-1 bg-indigo-100 text-indigo-700 rounded hover:bg-indigo-200" data-day="${day}">+ 新增</button>
            `;
            col.appendChild(header);

            const body = document.createElement('div');
            body.className = 'p-3 flex-1 overflow-y-auto kanban-col space-y-3';

            tasks.forEach((task, index) => {
                if (!task.id) task.id = generateId();
                const card = document.createElement('div');
                card.id = `task-${day}-${index}`;
                card.dataset.taskId = task.id;
                card.dataset.day = day;
                card.className = `task-card p-3 rounded-lg shadow-sm text-sm transition-all duration-300 cursor-default card-${task.type} relative`;

                let subTasksHtml = '';
                if (Array.isArray(task.subTasks) && task.subTasks.length > 0) {
                    subTasksHtml = '<div class="mt-2 space-y-1">' +
                        task.subTasks.map(st => `
                            <div class="sub-task-item">
                                <div class="flex justify-between items-center">
                                    <span class="font-semibold text-xs opacity-80">${escapeHtml(st.time)}</span>
                                    <span class="text-xs opacity-70">${escapeHtml(st.duration || '')}</span>
                                </div>
                                <div class="font-medium">${escapeHtml(st.title)}</div>
                            </div>
                        `).join('') + '</div>';
                }

                card.innerHTML = `
                    <div class="edit-actions absolute top-1 right-1 gap-1">
                        <button class="task-edit-btn text-xs bg-white/90 hover:bg-white text-indigo-700 px-1.5 py-0.5 rounded shadow">编辑</button>
                        <button class="task-delete-btn text-xs bg-white/90 hover:bg-white text-red-600 px-1.5 py-0.5 rounded shadow">删除</button>
                    </div>
                    <div class="flex justify-between items-start mb-1">
                        <span class="font-semibold text-xs opacity-80">${escapeHtml(task.time)}</span>
                        <span class="text-xs font-bold bg-white/50 px-1.5 py-0.5 rounded">${escapeHtml(task.duration)}</span>
                    </div>
                    <div class="font-bold text-base mt-1 task-title">${escapeHtml(task.title)}</div>
                    ${subTasksHtml}
                `;
                body.appendChild(card);
            });

            col.appendChild(body);
            board.appendChild(col);
        });

        // 绑定编辑/删除按钮
        bindEditEvents();

        // 切换编辑模式时同步显示新增按钮
        document.querySelectorAll('.add-task-btn').forEach(btn => {
            btn.classList.toggle('hidden', !document.body.classList.contains('edit-mode'));
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                openEditModal(null, btn.dataset.day);
            });
        });
    }

    function bindEditEvents() {
        document.querySelectorAll('.task-edit-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const card = btn.closest('.task-card');
                openEditModal(card.dataset.taskId, card.dataset.day);
            });
        });
        document.querySelectorAll('.task-delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const card = btn.closest('.task-card');
                if (confirm('确定要删除该日程吗？')) {
                    deleteTaskById(card.dataset.day, card.dataset.taskId);
                }
            });
        });
    }

    /** 重新渲染并应用所有筛选/高亮 */
    function rerenderBoard() {
        renderBoard();
        if (typeof updateBoardView === 'function') updateBoardView();
        if (typeof updateTaskVisibility === 'function') updateTaskVisibility();
        if (typeof updateHighlight === 'function') updateHighlight();
    }

    // ===== 编辑模式 =====
    function toggleEditMode() {
        document.body.classList.toggle('edit-mode');
        const isEditing = document.body.classList.contains('edit-mode');
        document.getElementById('btn-toggle-edit').textContent = isEditing ? '✅ 退出编辑模式' : '✏️ 进入编辑模式';
        document.querySelectorAll('.add-task-btn').forEach(btn => btn.classList.toggle('hidden', !isEditing));
    }

    // ===== 日程编辑模态框 =====
    let editingContext = { day: null, taskId: null }; // taskId 为 null 表示新建

    function openEditModal(taskId, day) {
        editingContext = { day: day || '周一', taskId: taskId || null };
        const modal = document.getElementById('edit-modal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        document.getElementById('edit-error').classList.add('hidden');

        const subListEl = document.getElementById('sub-tasks-list');
        subListEl.innerHTML = '';

        if (taskId) {
            // 编辑模式
            document.getElementById('edit-modal-title').textContent = '编辑日程';
            document.getElementById('edit-delete-btn').classList.remove('hidden');
            const task = (scheduleData[day] || []).find(t => t.id === taskId);
            if (task) {
                const [s, e] = task.time.split(' - ');
                document.getElementById('edit-day').value = day;
                document.getElementById('edit-start').value = s;
                document.getElementById('edit-end').value = e;
                document.getElementById('edit-title').value = task.title;
                document.getElementById('edit-type').value = task.type;
                (task.subTasks || []).forEach(st => addSubTaskInput(st));
            }
        } else {
            // 新建模式
            document.getElementById('edit-modal-title').textContent = '新建日程';
            document.getElementById('edit-delete-btn').classList.add('hidden');
            document.getElementById('edit-day').value = day || '周一';
            document.getElementById('edit-start').value = '';
            document.getElementById('edit-end').value = '';
            document.getElementById('edit-title').value = '';
            document.getElementById('edit-type').value = 'planned';
        }
    }

    function closeEditModal() {
        const modal = document.getElementById('edit-modal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }

    function addSubTaskInput(preset) {
        const list = document.getElementById('sub-tasks-list');
        const row = document.createElement('div');
        row.className = 'sub-task-row flex flex-wrap gap-1 items-center bg-gray-50 p-2 rounded';
        const [ps, pe] = (preset && preset.time) ? preset.time.split(' - ') : ['', ''];
        row.innerHTML = `
            <input type="time" class="sub-start border rounded px-1 py-1 text-sm" value="${ps}">
            <span class="text-gray-400">-</span>
            <input type="time" class="sub-end border rounded px-1 py-1 text-sm" value="${pe}">
            <input type="text" class="sub-title flex-1 min-w-[120px] border rounded px-2 py-1 text-sm" placeholder="子日程标题" value="${escapeHtml(preset && preset.title || '')}">
            <select class="sub-type border rounded px-1 py-1 text-sm">
                <option value="teaching" ${preset && preset.type === 'teaching' ? 'selected' : ''}>教学</option>
                <option value="planned" ${preset && preset.type === 'planned' ? 'selected' : ''}>规划</option>
                <option value="free" ${preset && preset.type === 'free' ? 'selected' : ''}>空闲</option>
            </select>
            <button type="button" class="text-red-500 hover:text-red-700 text-sm px-1" onclick="this.parentElement.remove()">×</button>
        `;
        list.appendChild(row);
    }

    function collectSubTasks() {
        const rows = document.querySelectorAll('#sub-tasks-list .sub-task-row');
        const result = [];
        for (const row of rows) {
            const s = row.querySelector('.sub-start').value;
            const e = row.querySelector('.sub-end').value;
            const t = row.querySelector('.sub-title').value.trim();
            const ty = row.querySelector('.sub-type').value;
            if (!s && !e && !t) continue; // 空行跳过
            if (!s || !e || !t) {
                throw new Error('子日程的开始时间、结束时间、标题均为必填项');
            }
            if (timeToMinutes(e) <= timeToMinutes(s)) {
                throw new Error(`子日程「${t}」的结束时间必须晚于开始时间`);
            }
            result.push({
                id: generateId(),
                time: `${s} - ${e}`,
                duration: calcDuration(s, e),
                title: t,
                type: ty
            });
        }
        // 子日程之间不能时间冲突
        for (let i = 0; i < result.length; i++) {
            for (let j = i + 1; j < result.length; j++) {
                const ai = timeToMinutes(result[i].time.split(' - ')[0]);
                const ae = timeToMinutes(result[i].time.split(' - ')[1]);
                const bi = timeToMinutes(result[j].time.split(' - ')[0]);
                const be = timeToMinutes(result[j].time.split(' - ')[1]);
                if (ai < be && ae > bi) {
                    throw new Error(`子日程「${result[i].title}」与「${result[j].title}」时间段重叠`);
                }
            }
        }
        return result;
    }

    function showEditError(msg) {
        const el = document.getElementById('edit-error');
        el.textContent = msg;
        el.classList.remove('hidden');
    }

    function saveTaskEdit() {
        const day = document.getElementById('edit-day').value;
        const start = document.getElementById('edit-start').value;
        const end = document.getElementById('edit-end').value;
        const title = document.getElementById('edit-title').value.trim();
        const type = document.getElementById('edit-type').value;

        if (!day || !start || !end || !title) {
            showEditError('日期、开始时间、结束时间、标题均为必填项');
            return;
        }
        const conflictMsg = validateTimeConflict(day, start, end, editingContext.taskId);
        if (conflictMsg) {
            showEditError(conflictMsg);
            return;
        }

        let subTasks;
        try {
            subTasks = collectSubTasks();
        } catch (err) {
            showEditError(err.message);
            return;
        }

        // 子日程时间应在父时间段内
        const pStart = timeToMinutes(start);
        const pEnd = timeToMinutes(end);
        for (const st of subTasks) {
            const [ss, se] = st.time.split(' - ');
            if (timeToMinutes(ss) < pStart || timeToMinutes(se) > pEnd) {
                showEditError(`子日程「${st.title}」(${st.time}) 必须在父日程时间段 (${start} - ${end}) 内`);
                return;
            }
        }

        const taskObj = {
            id: editingContext.taskId || generateId(),
            time: `${start} - ${end}`,
            duration: calcDuration(start, end),
            title: title,
            type: type,
            subTasks: subTasks
        };

        if (editingContext.taskId) {
            // 编辑：先在原 day 中删除（可能跨日期修改），再插入到新 day
            for (const d of Object.keys(scheduleData)) {
                scheduleData[d] = (scheduleData[d] || []).filter(t => t.id !== editingContext.taskId);
            }
            scheduleData[day] = scheduleData[day] || [];
            scheduleData[day].push(taskObj);
        } else {
            scheduleData[day] = scheduleData[day] || [];
            scheduleData[day].push(taskObj);
        }

        saveScheduleData();
        closeEditModal();
        rerenderBoard();
    }

    function deleteCurrentTask() {
        if (!editingContext.taskId) return;
        if (!confirm('确定要删除该日程吗？')) return;
        deleteTaskById(editingContext.day, editingContext.taskId);
        closeEditModal();
    }

    function deleteTaskById(day, taskId) {
        if (!scheduleData[day]) return;
        scheduleData[day] = scheduleData[day].filter(t => t.id !== taskId);
        saveScheduleData();
        rerenderBoard();
    }

    // 初始渲染
    renderBoard();
</script>
</body>
