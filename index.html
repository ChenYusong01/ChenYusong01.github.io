        body {

        }
        /* Custom scrollbar for kanban columns */
        .kanban-col::-webkit-scrollbar {
            width: 6px;
        }
        .kanban-col::-webkit-scrollbar-track {
            background: transparent;
        }
        .kanban-col::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
        .card-teaching {
            background-color: #fee2e2;
            border-left: 4px solid #ef4444;
            color: #7f1d1d;
        }
        .card-planned {
            background-color: #e0e7ff;
            border-left: 4px solid #6366f1;
            color: #312e81;
        }
        .card-free {
            background-color: #dcfce3;
            border-left: 4px solid #22c55e;
            color: #14532d;
        }
        .highlight-col {
            border: 2px solid #3b82f6 !important;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }
        .highlight-task {
            border: 2px solid #f59e0b !important;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
            transform: scale(1.02);
            position: relative;
            z-index: 10;
        }
        .highlight-task::after {
            content: '进行中';
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: #f59e0b;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }

        function checkPassword() {
            const input = document.getElementById('pwd-input').value;
            if (input === '13227810437') {
                document.getElementById('auth-modal').style.display = 'none';
                document.getElementById('main-content').classList.remove('hidden');
                updateHighlight();
                setInterval(updateHighlight, 60000); // 每分钟更新一次高亮
            } else {
                document.getElementById('pwd-error').classList.remove('hidden');
            }
        }

        function updateHighlight() {
            const now = new Date();
            const dayOfWeek = now.getDay(); // 0 (Sun) to 6 (Sat)
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();
            const currentTimeStr = `${currentHour.toString().padStart(2, '0')}:${currentMinute.toString().padStart(2, '0')}`;

            const daysMap = { 1: "周一", 2: "周二", 3: "周三", 4: "周四", 5: "周五" };
            const currentDayName = daysMap[dayOfWeek];

            // 清除所有高亮
            document.querySelectorAll('.kanban-col-container').forEach(col => col.classList.remove('highlight-col'));
            document.querySelectorAll('.task-card').forEach(card => card.classList.remove('highlight-task'));

            if (currentDayName) {
                // 高亮当前列
                const colElement = document.getElementById(`col-${currentDayName}`);
                if (colElement) {
                    colElement.classList.add('highlight-col');
                }

                // 高亮当前任务
                const tasks = scheduleData[currentDayName];
                if (tasks) {
                    tasks.forEach((task, index) => {
                        const [start, end] = task.time.split(' - ');
                        if (currentTimeStr >= start && currentTimeStr < end) {
                            const cardElement = document.getElementById(`task-${currentDayName}-${index}`);
                            if (cardElement) {
                                cardElement.classList.add('highlight-task');
                                // 平滑滚动到当前任务
                                cardElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            }
                        }
                    });
                }
            }
        }

        const board = document.getElementById('kanban-board');

        Object.entries(scheduleData).forEach(([day, tasks]) => {
            // Create column
            const col = document.createElement('div');
            col.id = `col-${day}`;
            col.className = 'kanban-col-container bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col h-[80vh] transition-all duration-300';
            
            // Column Header
            const header = document.createElement('div');
            header.className = 'p-4 border-b border-gray-100 bg-gray-50 rounded-t-xl';
            header.innerHTML = `<h2 class="text-lg font-bold text-gray-800 text-center">${day}</h2>`;
            col.appendChild(header);

            // Column Body (Scrollable)
            const body = document.createElement('div');
            body.className = 'p-3 flex-1 overflow-y-auto kanban-col space-y-3';

            tasks.forEach((task, index) => {
                const card = document.createElement('div');
                card.id = `task-${day}-${index}`;
                card.className = `task-card p-3 rounded-lg shadow-sm text-sm transition-all duration-300 hover:scale-[1.02] cursor-default card-${task.type}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="font-semibold text-xs opacity-80">${task.time}</span>
                        <span class="text-xs font-bold bg-white/50 px-1.5 py-0.5 rounded">${task.duration}</span>
                    </div>
                    <div class="font-bold text-base mt-1">${task.title}</div>
                `;
                body.appendChild(card);
            });

            col.appendChild(body);
            board.appendChild(col);
        });
